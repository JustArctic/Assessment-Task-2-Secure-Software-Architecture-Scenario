{% extends "layout.html" %}
{% block content %}

  <!-- Page heading for updating an existing comment -->
  <h3>Update Comment</h3>

  <!-- Form for editing a comment -->
  <form method="POST">
    {{ form.hidden_tag() }}  <!-- CSRF token + hidden fields -->

    <!-- Comment text field -->
    <div class="form-group">
      {{ form.content(class="form-control") }}
    </div>

    <!-- Submit button -->
    {{ form.submit(class="btn btn-outline-info") }}
  </form>

{% endblock %}
